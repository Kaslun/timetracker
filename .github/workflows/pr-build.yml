name: PR build preview

on:
  pull_request:
    types: [labeled, synchronize, reopened]

jobs:
  ci:
    if: contains(github.event.pull_request.labels.*.name, 'build-preview')
    uses: ./.github/workflows/ci.yml

  package:
    name: Package portable .exe
    needs: ci
    if: contains(github.event.pull_request.labels.*.name, 'build-preview')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: npm

      - name: Install
        run: npm ci

      - name: Build portable
        run: npm run dist:win:portable
        env:
          # Don't try to publish; we just want the artifact.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload portable artifact
        uses: actions/upload-artifact@v7
        with:
          name: AttensiTimeTracker-pr-${{ github.event.pull_request.number }}-portable
          path: release/*portable.exe
          retention-days: 14
