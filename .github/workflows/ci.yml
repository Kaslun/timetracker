name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck · lint · test · build
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        # @electron/rebuild >= 4.0.4 (pulled in transitively by
        # electron-builder@26) requires Node >= 22.12.0. Bumping below 22.x
        # will re-introduce the EBADENGINE warnings on `npm ci`.
        node-version: ['22.x', 'lts/*']

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Build (renderer + main + preload)
        run: npm run build

      - name: Audit production deps
        run: npm audit --omit=dev --audit-level=high

      - name: Upload coverage report
        if: always() && matrix.node-version == '22.x'
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
          retention-days: 14
